name: Build macOS x86_64 (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: '在 tag 触发时上传到 GitHub Release（手动触发时忽略）'
        required: false
        default: true
        type: boolean
  push:
    branches: [dev-*]
    tags:
      - 'v*'
    paths:
      - 'backend/**'
      - 'desktop/**'
      - 'frontend/**'
      - '.github/workflows/build-macos-x86-native.yml'

permissions:
  contents: write

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '20'
  RUST_TARGET: 'x86_64-apple-darwin'
  MACOSX_DEPLOYMENT_TARGET: '13.0'

jobs:
  build-macos-x86:
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        run: |
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup default stable
          rustup target add ${{ env.RUST_TARGET }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Build web frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Go sidecar (x86_64)
        run: |
          cd backend
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" \
            -o ../desktop/src-tauri/binaries/meterm-server-x86_64-apple-darwin .

      - name: Build desktop frontend
        run: |
          cd desktop
          npm ci
          npm run build

      - name: Build Tauri app (x86_64)
        run: |
          cd desktop
          npm run tauri build -- --target ${{ env.RUST_TARGET }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload DMG (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: meterm-macos-x86_64-dmg
          path: desktop/src-tauri/target/${{ env.RUST_TARGET }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload App Bundle (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: meterm-macos-x86_64-app
          path: desktop/src-tauri/target/${{ env.RUST_TARGET }}/release/bundle/macos/*.app
          if-no-files-found: ignore

      - name: Publish release assets (tag only)
        if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.upload_release) }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/${{ env.RUST_TARGET }}/release/bundle/dmg/*.dmg
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
