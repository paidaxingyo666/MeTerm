name: Build macOS x86_64 (Self-Hosted)

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: '在 tag 触发时上传到 GitHub Release（手动触发时忽略）'
        required: false
        default: true
        type: boolean
permissions:
  contents: write

env:
  NODE_VERSION: '20'
  RUST_TARGET: 'x86_64-apple-darwin'
  MACOSX_DEPLOYMENT_TARGET: '14.0'

jobs:
  build-macos-x86:
    runs-on: [self-hosted, macos]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        run: |
          if ! command -v rustup &>/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup default stable
          rustup target add ${{ env.RUST_TARGET }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Build web frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build desktop frontend
        run: |
          cd desktop
          npm ci
          npm run build

      - name: Build Tauri app (x86_64)
        run: |
          cd desktop
          npm run tauri build -- --target ${{ env.RUST_TARGET }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Install create-dmg
        run: |
          if ! command -v create-dmg &>/dev/null; then
            brew install create-dmg
          fi

      - name: Build & embed Finder Extension (x86_64)
        run: |
          APP_PATH=$(find desktop/src-tauri/target/${{ env.RUST_TARGET }}/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          bash desktop/scripts/build-finder-extension.sh "$APP_PATH"

      # Rebuild DMG after embedding Finder Extension
      - name: Rebuild DMG with Finder Extension (x86_64)
        run: |
          DMG_DIR=desktop/src-tauri/target/${{ env.RUST_TARGET }}/release/bundle/dmg
          APP_PATH=$(find desktop/src-tauri/target/${{ env.RUST_TARGET }}/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ] && [ -d "$DMG_DIR" ]; then
            APP_NAME=$(basename "$APP_PATH" .app)
            OLD_DMG=$(find "$DMG_DIR" -name "*.dmg" -maxdepth 1 | head -1)
            if [ -n "$OLD_DMG" ]; then
              DMG_NAME=$(basename "$OLD_DMG")
              rm -f "$OLD_DMG"
              create-dmg \
                --volname "$APP_NAME" \
                --window-size 660 400 \
                --icon-size 80 \
                --icon "$APP_NAME.app" 180 170 \
                --app-drop-link 480 170 \
                "$DMG_DIR/$DMG_NAME" \
                "$APP_PATH" || true
            fi
          fi

      - name: Upload DMG (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: meterm-macos-x86_64-dmg
          path: desktop/src-tauri/target/${{ env.RUST_TARGET }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 1

      - name: Upload App Bundle (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: meterm-macos-x86_64-app
          path: desktop/src-tauri/target/${{ env.RUST_TARGET }}/release/bundle/macos/*.app
          if-no-files-found: ignore
          retention-days: 1

      - name: Publish release assets (tag only)
        if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.upload_release) }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/${{ env.RUST_TARGET }}/release/bundle/dmg/*.dmg
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
