name: Build Linux

on:
  workflow_dispatch:
    inputs:
      arch:
        description: '目标架构'
        required: true
        default: 'both'
        type: choice
        options:
          - amd64
          - arm64
          - both
  # push auto-build disabled — use workflow_dispatch for manual builds
  # push:
  #   branches: [main, release/*]
  #   paths:
  #     - 'backend/**'
  #     - 'desktop/**'
  #     - 'frontend/**'
  #     - '.github/workflows/build-linux.yml'

env:
  NODE_VERSION: '20'

jobs:
  build-linux-amd64:
    if: ${{ github.event_name == 'push' || inputs.arch == 'amd64' || inputs.arch == 'both' }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Tauri 在 Linux 上需要的系统依赖
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Rust 后端通过 rust_embed 嵌入 frontend/dist/
      - name: Build web frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build desktop frontend
        run: |
          cd desktop
          npm ci
          npm run build

      - name: Build Tauri app (amd64)
        run: |
          cd desktop
          npm run tauri build -- --target x86_64-unknown-linux-gnu
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload deb package (amd64)
        uses: actions/upload-artifact@v4
        with:
          name: meterm-linux-amd64-deb
          path: desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb

      - name: Upload AppImage (amd64)
        uses: actions/upload-artifact@v4
        with:
          name: meterm-linux-amd64-appimage
          path: desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

      - name: Upload rpm package (amd64)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: meterm-linux-amd64-rpm
          path: desktop/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
          if-no-files-found: ignore

  build-linux-arm64:
    if: ${{ github.event_name == 'push' || inputs.arch == 'arm64' || inputs.arch == 'both' }}
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            xdg-utils

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Rust 后端通过 rust_embed 嵌入 frontend/dist/
      - name: Build web frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build desktop frontend
        run: |
          cd desktop
          npm ci
          npm run build

      - name: Build Tauri app (arm64)
        run: |
          cd desktop
          npm run tauri build -- --target aarch64-unknown-linux-gnu
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload deb package (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: meterm-linux-arm64-deb
          path: desktop/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb

      - name: Upload AppImage (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: meterm-linux-arm64-appimage
          path: desktop/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

      - name: Upload rpm package (arm64)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: meterm-linux-arm64-rpm
          path: desktop/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm
          if-no-files-found: ignore
