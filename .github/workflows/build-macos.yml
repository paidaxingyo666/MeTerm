name: Build macOS

on:
  workflow_dispatch:
    inputs:
      arch:
        description: '目标架构'
        required: true
        default: 'both'
        type: choice
        options:
          - arm64
          - x86_64
          - both
      sign:
        description: '启用代码签名'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '20'
  # Must match minimumSystemVersion in tauri.conf.json to ensure consistent
  # native UI rendering (traffic light buttons, titlebar style, etc.)
  MACOSX_DEPLOYMENT_TARGET: '14.0'

jobs:
  build-macos-arm64:
    if: ${{ github.event_name == 'push' || inputs.arch == 'arm64' || inputs.arch == 'both' }}
    runs-on: macos-latest  # Apple Silicon (M1+)
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (macOS 26 SDK for native UI)
        run: |
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_26" ]; then
            sudo xcode-select -s "$XCODE_26"
            echo "Selected: $XCODE_26"
          fi
          xcodebuild -version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Web 前端必须先构建，Go 后端通过 go:embed 嵌入 backend/web/dist/
      - name: Build web frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Go sidecar (arm64)
        run: |
          cd backend
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" \
            -o ../desktop/src-tauri/binaries/meterm-server-aarch64-apple-darwin .

      - name: Build desktop frontend
        run: |
          cd desktop
          npm ci
          npm run build

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build Tauri app (arm64)
        run: |
          cd desktop
          npm run tauri build -- --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build & embed Finder Extension (arm64)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH=$(find desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          SIGN_ID="${APPLE_SIGNING_IDENTITY:--}"
          bash desktop/scripts/build-finder-extension.sh "$APP_PATH" "$SIGN_ID"

      # 可选: 代码签名
      - name: Code sign (optional)
        if: ${{ inputs.sign && env.APPLE_SIGNING_IDENTITY != '' }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH=$(find desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            codesign --deep --force --options runtime \
              --sign "$APPLE_SIGNING_IDENTITY" \
              --timestamp "$APP_PATH"
            codesign --verify --verbose=2 "$APP_PATH"
          fi

      # Rebuild updater .tar.gz after embedding Finder Extension (Tauri creates it before we embed)
      - name: Rebuild updater artifact with Finder Extension (arm64)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE_DIR=desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          APP_NAME=$(basename "$(find "$BUNDLE_DIR" -name "*.app" -maxdepth 1 | head -1)")
          if [ -n "$APP_NAME" ] && [ -f "$BUNDLE_DIR/${APP_NAME}.tar.gz" ]; then
            echo "Rebuilding ${APP_NAME}.tar.gz with Finder Extension..."
            cd "$BUNDLE_DIR"
            rm -f "${APP_NAME}.tar.gz"
            tar czf "${APP_NAME}.tar.gz" "$APP_NAME"
            # Re-sign with Tauri updater key if available
            if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
              npx --yes @tauri-apps/cli signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" \
                ${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:+-p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"} \
                "${APP_NAME}.tar.gz"
            fi
          fi

      - name: Rename updater artifacts (arm64)
        run: |
          BUNDLE_DIR=desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          if [ -f "$BUNDLE_DIR/MeTerm.app.tar.gz" ]; then
            mv "$BUNDLE_DIR/MeTerm.app.tar.gz" "$BUNDLE_DIR/MeTerm_aarch64.app.tar.gz"
            mv "$BUNDLE_DIR/MeTerm.app.tar.gz.sig" "$BUNDLE_DIR/MeTerm_aarch64.app.tar.gz.sig"
          fi

      # Rebuild DMG after embedding Finder Extension
      - name: Rebuild DMG with Finder Extension (arm64)
        run: |
          DMG_DIR=desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg
          APP_PATH=$(find desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ] && [ -d "$DMG_DIR" ]; then
            APP_NAME=$(basename "$APP_PATH" .app)
            OLD_DMG=$(find "$DMG_DIR" -name "*.dmg" -maxdepth 1 | head -1)
            if [ -n "$OLD_DMG" ]; then
              DMG_NAME=$(basename "$OLD_DMG")
              rm -f "$OLD_DMG"
              create-dmg \
                --volname "$APP_NAME" \
                --window-size 660 400 \
                --icon-size 80 \
                --icon "$APP_NAME.app" 180 170 \
                --app-drop-link 480 170 \
                "$DMG_DIR/$DMG_NAME" \
                "$APP_PATH" || true
            fi
          fi

      - name: Upload DMG (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: meterm-macos-arm64-dmg
          path: desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload App Bundle (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: meterm-macos-arm64-app
          path: desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

      - name: Publish release assets (tag only)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*_aarch64.app.tar.gz
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*_aarch64.app.tar.gz.sig
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  build-macos-x86_64:
    if: ${{ github.event_name == 'push' || inputs.arch == 'x86_64' || inputs.arch == 'both' }}
    runs-on: macos-latest  # Cross-compile x86_64 on Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26 (macOS 26 SDK for native UI)
        run: |
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE_26" ]; then
            sudo xcode-select -s "$XCODE_26"
            echo "Selected: $XCODE_26"
          fi
          xcodebuild -version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # Web 前端必须先构建，Go 后端通过 go:embed 嵌入 backend/web/dist/
      - name: Build web frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build Go sidecar (x86_64)
        run: |
          cd backend
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" \
            -o ../desktop/src-tauri/binaries/meterm-server-x86_64-apple-darwin .

      - name: Build desktop frontend
        run: |
          cd desktop
          npm ci
          npm run build

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build Tauri app (x86_64)
        run: |
          cd desktop
          npm run tauri build -- --target x86_64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build & embed Finder Extension (x86_64)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH=$(find desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          SIGN_ID="${APPLE_SIGNING_IDENTITY:--}"
          bash desktop/scripts/build-finder-extension.sh "$APP_PATH" "$SIGN_ID"

      # 可选: 代码签名
      - name: Code sign (optional)
        if: ${{ inputs.sign && env.APPLE_SIGNING_IDENTITY != '' }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH=$(find desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            codesign --deep --force --options runtime \
              --sign "$APPLE_SIGNING_IDENTITY" \
              --timestamp "$APP_PATH"
            codesign --verify --verbose=2 "$APP_PATH"
          fi

      # Rebuild updater .tar.gz after embedding Finder Extension
      - name: Rebuild updater artifact with Finder Extension (x86_64)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          BUNDLE_DIR=desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos
          APP_NAME=$(basename "$(find "$BUNDLE_DIR" -name "*.app" -maxdepth 1 | head -1)")
          if [ -n "$APP_NAME" ] && [ -f "$BUNDLE_DIR/${APP_NAME}.tar.gz" ]; then
            echo "Rebuilding ${APP_NAME}.tar.gz with Finder Extension..."
            cd "$BUNDLE_DIR"
            rm -f "${APP_NAME}.tar.gz"
            tar czf "${APP_NAME}.tar.gz" "$APP_NAME"
            if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
              npx --yes @tauri-apps/cli signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" \
                ${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:+-p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"} \
                "${APP_NAME}.tar.gz"
            fi
          fi

      - name: Rename updater artifacts (x86_64)
        run: |
          BUNDLE_DIR=desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos
          if [ -f "$BUNDLE_DIR/MeTerm.app.tar.gz" ]; then
            mv "$BUNDLE_DIR/MeTerm.app.tar.gz" "$BUNDLE_DIR/MeTerm_x86_64.app.tar.gz"
            mv "$BUNDLE_DIR/MeTerm.app.tar.gz.sig" "$BUNDLE_DIR/MeTerm_x86_64.app.tar.gz.sig"
          fi

      # Rebuild DMG after embedding Finder Extension
      - name: Rebuild DMG with Finder Extension (x86_64)
        run: |
          DMG_DIR=desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg
          APP_PATH=$(find desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ] && [ -d "$DMG_DIR" ]; then
            APP_NAME=$(basename "$APP_PATH" .app)
            OLD_DMG=$(find "$DMG_DIR" -name "*.dmg" -maxdepth 1 | head -1)
            if [ -n "$OLD_DMG" ]; then
              DMG_NAME=$(basename "$OLD_DMG")
              rm -f "$OLD_DMG"
              create-dmg \
                --volname "$APP_NAME" \
                --window-size 660 400 \
                --icon-size 80 \
                --icon "$APP_NAME.app" 180 170 \
                --app-drop-link 480 170 \
                "$DMG_DIR/$DMG_NAME" \
                "$APP_PATH" || true
            fi
          fi

      - name: Upload DMG (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: meterm-macos-x86_64-dmg
          path: desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Upload App Bundle (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: meterm-macos-x86_64-app
          path: desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app

      - name: Publish release assets (tag only)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*_x86_64.app.tar.gz
            desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*_x86_64.app.tar.gz.sig
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
