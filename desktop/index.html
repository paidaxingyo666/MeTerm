<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Set background color immediately to prevent white flash in new windows
      (function() {
        var bg = '#2d2d2d';
        try {
          var s = JSON.parse(localStorage.getItem('meterm-settings') || '{}');
          var cs = s.colorScheme || 'auto';
          var dark = cs === 'dark' || cs === 'darker' || (cs === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          bg = cs === 'darker' ? '#121214' : dark ? '#2d2d2d' : '#f5f5f5';
        } catch(e) {}
        document.documentElement.style.backgroundColor = bg;
        // For sub-windows: also set body background via <style> (won't affect main window transparency)
        if (window.location.search.includes('window=')) {
          var st = document.createElement('style');
          st.textContent = 'body{background:' + bg + '}';
          document.head.appendChild(st);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeTerm</title>
  </head>
  <body>
    <div id="app">
      <div id="window-toolbar">
        <div id="window-toolbar-drag-layer" data-tauri-drag-region></div>
        <div id="window-toolbar-left"></div>
        <div id="window-toolbar-tabs"></div>
        <div id="window-toolbar-right"></div>
      </div>
      <div id="tab-bar"></div>
      <div id="status"></div>
      <div id="main-content">
        <div id="terminal-panel"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
  </html>
